version: '3.8'

services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - GITHUB_TOKEN=${GITHUB_TOKEN}
    volumes:
      - ./projects:/app/projects

  preview:
    image: node:20-alpine
    working_dir: /app/project
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "3001:3000"
    volumes:
      - ./projects:/app/project
